<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>India Wildlife - Professional Quiz</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #2c3e50;
            --success: #27ae60;
            --danger: #e74c3c;
            --accent: #f39c12;
            --misc: #9b59b6;
            --active: #a040ff;
            /* Purple for current random target */
            --bg-card: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: #e0eafc;
            overflow: hidden;
        }

        #map {
            width: 100%;
            height: 100vh;
            background: #b3d1ff;
        }

        .scoreboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            border: 2px solid var(--primary);
        }

        .score-val {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary);
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: #fff;
            cursor: pointer;
            font-weight: 600;
            margin: 5px 2px;
            transition: 0.2s;
            display: inline-block;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 35px;
            width: 420px;
            text-align: center;
            position: relative;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            cursor: default;
        }

        .details-card {
            display: none;
            margin-top: 20px;
            text-align: left;
            background: #f8f9fa;
            border-radius: 15px;
            border: 2px solid #eee;
            overflow: hidden;
            animation: fadeIn 0.5s;
        }

        .details-header {
            background: var(--primary);
            color: white;
            padding: 10px 15px;
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .details-body {
            padding: 15px;
            font-size: 16px;
            line-height: 1.6;
            color: #333;
        }

        .details-body b {
            color: var(--primary);
            font-size: 17px;
        }

        .guess-input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: 3px solid #dfe6e9;
            outline: none;
            box-sizing: border-box;
            font-size: 18px;
            font-weight: 600;
            transition: 0.3s;
        }

        .guess-input:focus {
            border-color: var(--accent);
        }

        .feedback-text {
            font-size: 22px;
            font-weight: 800;
            margin: 15px 0;
        }

        .legend {
            background: white;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 2px solid #000;
        }

        .place-label {
            font-weight: 800;
            font-size: 11px;
            color: #000;
            background: white;
            border: 1px solid #000;
            padding: 2px;
        }

        .custom-icon {
            transition: transform 0.2s;
            cursor: pointer;
        }

        i.fa-solid {
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }
        .timer-box {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            border: 2px solid var(--primary);
            text-align: center;
            min-width: 100px;
        }
    </style>
</head>

<body>

    <div class="timer-box animate__animated animate__fadeInDown">
        <span style="font-size: 14px; color: #666;">Time Elapsed</span><br>
        <span class="score-val" id="timer">00:00</span>
    </div>

    <div id="map"></div>

    <div class="scoreboard animate__animated animate__fadeInDown">
        <span style="font-size: 14px; color: #666;">Current Score</span><br>
        <span class="score-val" id="score">0</span> <span class="score-val" style="color:#ccc">/</span> <span
            class="score-val" id="total">0</span>
        <div style="margin-top: 10px;">
            <button class="btn" id="resetBtn">Reset</button>
            <button class="btn" id="randomBtn" style="background:var(--active)">Random Challenge</button>
            <button class="btn" id="showAllBtn" style="background:#636e72">Show All</button>
        </div>
    </div>

    <div id="guessModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" style="margin-top:0; color:var(--primary)">Identify this area?</h2>

            <input class="guess-input" id="guessInput" placeholder="Ex: Namdapha NP (TR)" autocomplete="off" />

            <div id="feedback" class="feedback-text"></div>

            <div id="revealCard" class="details-card">
                <div class="details-header"><i class="fa-solid fa-circle-info"></i> Information Card</div>
                <div class="details-body" id="detailsText"></div>
            </div>

            <button id="nextBtn" class="btn"
                style="display:none; margin-top:20px; width:100%; padding:15px; font-size:16px;">CLOSE</button>
        </div>
    </div>

        let seconds = 0;
        let timerInterval = null;

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            seconds = 0;
            document.getElementById('timer').textContent = "00:00";
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer').textContent = `${mins}:${secs}`;
            }, 1000);
        }

        // --- MAP INIT ---
        const map = L.map('map', {
            zoomControl: false,
            zoomSnap: 1,
            zoomAnimation: true,
            markerZoomAnimation: true,
            fadeAnimation: true
        }).setView([22.9, 80.5], 5);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/countries/india/india-states.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, { style: { color: "#000000", weight: 3.5, fillOpacity: 0.08 } }).addTo(map);
            });

        let score = 0;
        let currentLoc = null;
        let currentMarker = null;
        const markers = [];
        let isSequentialMode = false;
        let currentActiveMarker = null;

        function getCorrectString(loc) {
            if (loc.isMisc) return loc.name;
            if (loc.isNP && loc.isTR) return `${loc.name} NP (TR)`;
            if (loc.isNP) return `${loc.name} NP`;
            if (loc.isWLS) return `${loc.name} WLS`;
            if (loc.isTR) return `${loc.name} TR`;
            return loc.name;
        }

        function createIcon(loc, color = null) {
            let iconClass = "fa-tree";
            let iconColor = color || "#8EDB86";
            if (loc.isMisc) { iconClass = "fa-star"; if (!color) iconColor = "var(--misc)"; }
            else if (loc.isWLS) { iconClass = "fa-shield-halved"; if (!color) iconColor = "#f1c40f"; }
            else if (loc.isTR && !loc.isNP) { iconClass = "fa-paw"; if (!color) iconColor = "#e67e22"; }

            return L.divIcon({
                className: 'custom-icon',
                html: `<i class="fa-solid ${iconClass}" style="color:${iconColor}; font-size: 24px;"></i>`,
                iconSize: [30, 30], iconAnchor: [15, 15]
            });
        }

        function openModal(loc, marker) {
            currentLoc = loc;
            currentMarker = marker;
            modal.style.display = 'flex';

            if (loc.guessed) {
                document.getElementById('modalTitle').innerText = getCorrectString(loc);
                input.style.display = 'none';
                feedback.textContent = loc.wasCorrect ? "✅ GUESSED CORRECTLY" : "❌ GUESSED INCORRECTLY";
                feedback.style.color = loc.wasCorrect ? "var(--success)" : "var(--danger)";
                detailsText.innerHTML = loc.details;
                revealCard.style.display = 'block';
                nextBtn.style.display = 'block';
            } else {
                document.getElementById('modalTitle').innerText = "Identify this area?";
                input.style.display = 'block';
                input.value = '';
                input.focus();
                feedback.textContent = '';
                revealCard.style.display = 'none';
                nextBtn.style.display = 'none';
            }
        }

        function checkGuess() {
            const guess = input.value.trim().toLowerCase();
            const correctAns = getCorrectString(currentLoc);
            const isCorrect = guess === correctAns.toLowerCase();

            currentLoc.guessed = true;
            currentLoc.wasCorrect = isCorrect;

            input.style.display = 'none';
            detailsText.innerHTML = currentLoc.details;
            revealCard.style.display = 'block';
            nextBtn.style.display = 'block';

            const resultColor = isCorrect ? "var(--success)" : "var(--danger)";

            if (isCorrect) {
                score++;
                document.getElementById('score').textContent = score;
                feedback.textContent = "CORRECT!";
                feedback.style.color = "var(--success)";
            } else {
                feedback.textContent = `WRONG! It's ${correctAns}`;
                feedback.style.color = "var(--danger)";
            }

            // This line is crucial: it changes the icon from Purple to Green/Red
            currentMarker.setIcon(createIcon(currentLoc, resultColor));

            const allGuessed = locations.every(loc => loc.guessed === true);
            if (allGuessed) {
                clearInterval(timerInterval);
                // Optional: Add an alert or visual cue that they finished
                document.getElementById('timer').style.color = "var(--success)";
            }
        }

        function initGame() {
            startTimer(); 
            isSequentialMode = false;
            currentActiveMarker = null;
            markers.forEach(m => map.removeLayer(m.marker));
            markers.length = 0;
            score = 0;
            document.getElementById('score').textContent = 0;
            document.getElementById('total').textContent = locations.length;

            locations.forEach(loc => {
                loc.guessed = false;
                const marker = L.marker(loc.coords, { icon: createIcon(loc) }).addTo(map);
                marker.on('click', (e) => {
                    L.DomEvent.stopPropagation(e);
                    openModal(loc, marker);
                });
                markers.push({ marker, data: loc });
            });
        }

        function pickNextRandom() {
            // Uniquely identify markers that have not been guessed yet
            const available = markers.filter(m => m.data.guessed === false);

            if (available.length === 0) {
                alert("Challenge Complete! You have identified every site uniquely.");
                isSequentialMode = false;
                if (currentActiveMarker) currentActiveMarker.marker.setIcon(createIcon(currentActiveMarker.data));
                return;
            }

            // Pick a random one from the remaining unique set
            const target = available[Math.floor(Math.random() * available.length)];

            // Clean up the previous purple marker if it wasn't guessed
            if (currentActiveMarker && !currentActiveMarker.data.guessed) {
                currentActiveMarker.marker.setIcon(createIcon(currentActiveMarker.data));
            }

            currentActiveMarker = target;
            // Set the target to Purple (Active)
            target.marker.setIcon(createIcon(target.data, "var(--active)"));

            map.flyTo(target.data.coords, 8, { animate: true, duration: 1.5 });

            setTimeout(() => {
                openModal(target.data, target.marker);
            }, 1700);
        }

        const modal = document.getElementById('guessModal');
        const input = document.getElementById('guessInput');
        const feedback = document.getElementById('feedback');
        const revealCard = document.getElementById('revealCard');
        const detailsText = document.getElementById('detailsText');
        const nextBtn = document.getElementById('nextBtn');

        input.addEventListener('keypress', e => { if (e.key === 'Enter') checkGuess(); });

        nextBtn.addEventListener('click', () => {
            modal.style.display = 'none';

            // Only trigger the next random site if:
            // 1. We are in Sequential Mode
            // 2. The site we just closed was the one the game actually picked for us
            if (isSequentialMode && currentLoc === currentActiveMarker?.data) {
                setTimeout(pickNextRandom, 600);
            }
        });

        document.getElementById('resetBtn').addEventListener('click', initGame);
        document.getElementById('randomBtn').addEventListener('click', () => {
            isSequentialMode = true;
            pickNextRandom();
        });

        document.getElementById('showAllBtn').addEventListener('click', () => {
            markers.forEach(m => {
                const tip = L.tooltip({ permanent: true, direction: 'top', className: 'place-label' })
                    .setContent(getCorrectString(m.data)).setLatLng(m.data.coords).addTo(map);
                setTimeout(() => map.removeLayer(tip), 4000);
            });
        });

        const modalElement = document.getElementById('guessModal');
        ['click', 'touchstart'].forEach(eventType => {
            modalElement.addEventListener(eventType, function (event) {
                if (event.target === modalElement) {
                    modalElement.style.display = "none";
                }
            });
        });

        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
                <b style="font-size:14px">Map Legend</b><br>
                <i class="fa-solid fa-tree" style="color:#2ecc71"></i> NP / NP (TR)<br>
                <i class="fa-solid fa-shield-halved" style="color:#f1c40f"></i> WLS<br>
                <i class="fa-solid fa-paw" style="color:#e67e22"></i> TR (Only)<br>
                <i class="fa-solid fa-star" style="color:var(--misc)"></i> Misc / Special<br>
                <i class="fa-solid fa-circle" style="color:var(--active)"></i> Active Target
            `;
            return div;
        };
        legend.addTo(map);

        initGame();
    </script>
</body>

</html>
