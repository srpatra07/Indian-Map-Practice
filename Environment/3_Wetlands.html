<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wetlands of India - Guessing Game</title>

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: #f5f7fa;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        /* Scoreboard */
        .scoreboard {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, .18);
            font-weight: 600;
            z-index: 1000;
        }

        .scoreboard button {
            margin-left: 8px;
            padding: 6px 10px;
            border: none;
            border-radius: 8px;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            border-radius: 14px;
            padding: 25px;
            width: 340px;
            text-align: center;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .2);
        }

        /* Fact Box (shown after guessing) */
        .fact-box {
            text-align: left;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #007bff;
        }

        .fact-box h4 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .fact-box p {
            font-size: 14px;
            margin: 5px 0;
            color: #555;
            line-height: 1.4;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 16px;
        }

        #submitGuess {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #007bff;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        .close-modal {
            margin-top: 15px;
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
        }

        .feedback {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 18px;
        }

        /* Legend */
        .legend {
            background: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, .15);
            font-size: 13px;
            line-height: 1.8;
        }

        .dot-legend {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
            vertical-align: middle;
            border: 1px solid #999;
        }

        .place-label {
            font-weight: 700;
            background: transparent;
            border: none;
            box-shadow: none;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <div class="scoreboard">
        Score: <span id="score">0</span> / <span id="total">0</span>
        <button id="resetBtn">Reset</button>
        <button id="showAllBtn">Show All</button>
    </div>

    <!-- Unified Modal -->
    <div class="modal" id="gameModal">
        <div class="modal-content">

            <!-- Guessing Screen -->
            <div id="guessView">
                <h3>Guess the Wetland</h3>
                <input id="guessInput" placeholder="Enter name or state" autocomplete="off" />
                <button id="submitGuess">Submit</button>
            </div>

            <!-- Info/Result Screen -->
            <div id="resultView" style="display:none;">
                <div id="feedback" class="feedback"></div>
                <div class="fact-box">
                    <h4 id="infoName"></h4>
                    <p><strong>State:</strong> <span id="infoState"></span></p>
                    <p><strong>Fact 1:</strong> <span id="fact1"></span></p>
                    <p><strong>Fact 2:</strong> <span id="fact2"></span></p>
                </div>
                <button class="close-modal" id="closeBtn">Close</button>
            </div>

        </div>
    </div>

        console.log(wetlandsData.length);


        // --- Configuration & Colors ---
        const colors = {
            blue: '#007bff',      // addedLater: false
            purple: '#9b59b6',    // addedLater: true
            correct: '#28a745',
            wrong: '#dc3545'
        };

        const map = L.map('map', { minZoom: 3, maxZoom: 10 }).setView([22.5, 78.9], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        fetch('https://raw.githubusercontent.com/gregoiredavid/france-geojson/master/countries/india/india-states.json')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, { style: { color: "#000000", weight: 3.5, fillOpacity: 0.08 } }).addTo(map);
            });
        // L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        //     attribution: '© OpenStreetMap contributors'
        // }).addTo(map);

        let score = 0;
        let markers = [];
        let currentTarget = null;

        const modal = document.getElementById('gameModal');
        const guessView = document.getElementById('guessView');
        const resultView = document.getElementById('resultView');
        const feedback = document.getElementById('feedback');
        const input = document.getElementById('guessInput');

        // --- Helper: Create a Circular Point ---
        function createIcon(color) {
            return L.divIcon({
                className: 'custom-point',
                html: `<div style="background-color:${color}; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });
        }

        // --- Initialize Game ---
        function initGame() {
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('total').textContent = wetlandsData.length;

            wetlandsData.forEach(w => {
                const initialColor = w.addedLater ? colors.purple : colors.blue;
                const marker = L.marker(w.coords, {
                    icon: createIcon(initialColor)
                }).addTo(map);

                const markerObj = { marker, data: w, guessed: false, result: null };

                marker.on('click', () => {
                    currentTarget = markerObj;
                    if (!markerObj.guessed) {
                        showGuessMode();
                    } else {
                        showInfoMode(markerObj);
                    }
                });

                markers.push(markerObj);
            });
        }

        function showGuessMode() {
            guessView.style.display = 'block';
            resultView.style.display = 'none';
            input.value = '';
            modal.style.display = 'flex';
            input.focus();
        }

        function showInfoMode(mObj) {
            guessView.style.display = 'none';
            resultView.style.display = 'block';

            // Set feedback text based on previous guess
            if (mObj.result === 'correct') {
                feedback.textContent = "✅ Correct!";
                feedback.style.color = colors.correct;
            } else if (mObj.result === 'wrong') {
                feedback.textContent = `❌ ${mObj.data.name}`;
                feedback.style.color = colors.wrong;
            } else {
                feedback.textContent = "Information";
                feedback.style.color = "#333";
            }

            document.getElementById('infoName').textContent = mObj.data.name;
            document.getElementById('infoState').textContent = mObj.data.state;
            document.getElementById('fact1').textContent = mObj.data.fact1;
            document.getElementById('fact2').textContent = mObj.data.fact2;

            modal.style.display = 'flex';
        }

        document.getElementById('submitGuess').addEventListener('click', () => {
            if (!currentTarget) return;

            const guess = input.value.trim().toLowerCase();
            const isCorrect =
                guess === currentTarget.data.name.toLowerCase() ||
                guess === currentTarget.data.state.toLowerCase();

            currentTarget.guessed = true;
            currentTarget.result = isCorrect ? 'correct' : 'wrong';

            if (isCorrect) {
                score++;
                document.getElementById('score').textContent = score;
            }

            // Update marker point color permanently
            currentTarget.marker.setIcon(createIcon(isCorrect ? colors.correct : colors.wrong));

            // Show the facts immediately after guessing
            showInfoMode(currentTarget);
        });

        // Handle Enter Key
        input.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('submitGuess').click(); });

        // Close buttons
        document.getElementById('closeBtn').onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; };

        // Reset & Show All
        document.getElementById('resetBtn').onclick = initGame;
        document.getElementById('showAllBtn').onclick = () => {
            markers.forEach(m => {
                const tip = L.tooltip({ permanent: true, direction: 'top', className: 'place-label' })
                    .setContent(`<b>${m.data.name}</b>`)
                    .setLatLng(m.data.coords)
                    .addTo(map);
                setTimeout(() => map.removeLayer(tip), 3000);
            });
        };

        // --- Legend (Using Points) ---
        const legend = L.control({ position: 'bottomright' });
        legend.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML = `
      <b>Legend</b><br>
      <span class="dot-legend" style="background:${colors.blue}"></span> Standard<br>
      <span class="dot-legend" style="background:${colors.purple}"></span> Added Later<br>
      <span class="dot-legend" style="background:${colors.correct}"></span> Correct<br>
      <span class="dot-legend" style="background:${colors.wrong}"></span> Wrong
    `;
            return div;
        };
        legend.addTo(map);

        initGame();

    </script>
