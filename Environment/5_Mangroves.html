<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Mangroves of India - Guessing Game</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <style>
        body {
            margin: 0;
            font-family: "Poppins", sans-serif;
            background: #f0f4f0;
        }

        #map {
            width: 100%;
            height: 100vh;
        }

        .scoreboard {
            position: absolute;
            top: 15px;
            left: 15px;
            background: #fff;
            padding: 10px 18px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, .18);
            font-weight: 600;
            z-index: 1000;
        }

        .scoreboard button {
            margin-left: 8px;
            padding: 6px 10px;
            border: none;
            border-radius: 8px;
            background: #257ca5;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, .5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #fff;
            border-radius: 14px;
            padding: 25px;
            width: 360px;
            text-align: center;
            box-shadow: 0 6px 24px rgba(0, 0, 0, .2);
        }

        .fact-box {
            text-align: left;
            background: #e8f5e9;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            border-left: 5px solid #44c4cd;
        }

        .fact-box h4 {
            margin: 0 0 10px 0;
            color: #29759b;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            box-sizing: border-box;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 16px;
        }

        #submitGuess {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #2cc5d3;
            color: #fff;
            cursor: pointer;
            font-weight: 700;
        }

        .close-modal {
            margin-top: 15px;
            background: #6c757d;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: 700;
        }

        .feedback {
            font-weight: 700;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .legend {
            background: #fff;
            padding: 10px 14px;
            border-radius: 10px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, .15);
            font-size: 13px;
        }

        .dot-legend {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
    </style>
</head>

<body>

    <div id="map"></div>

    <div class="scoreboard">
        Score : <span id="score">0</span> / <span id="total">0</span>
        <button id="resetBtn">Reset</button>
        <button id="showAllBtn">Show All</button>
    </div>

    <div class="modal" id="gameModal">
        <div class="modal-content">
            <div id="guessView">
                <h3>Guess the Mangrove Site</h3>
                <input id="guessInput" placeholder="Name or State" autocomplete="off" />
                <button id="submitGuess">Submit</button>
            </div>

            <div id="resultView" style="display:none;">
                <div id="feedback" class="feedback"></div>
                <div class="fact-box">
                    <h4 id="infoName"></h4>
                    <p><strong>State:</strong> <span id="infoState"></span></p>
                </div>
                <button class="close-modal" id="closeBtn">Close</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const mangrovesData = [
            // ... (Keep your existing mangrovesData array here)
            { name: "Subarnarekha Mangroves", state: "Odisha", coords: [21.56, 87.35] },
            { name: "Bhitarkanika Mangroves", state: "Odisha", coords: [20.73, 86.90] },
            { name: "Dhamara Mangroves", state: "Odisha", coords: [20.88, 86.95] },
            { name: "Kalibhanjadia Island Mangroves", state: "Odisha", coords: [20.80, 86.92] },
            { name: "Devi Mouth Mangroves", state: "Odisha", coords: [20.01, 86.35] },
            { name: "Chilika Lake Mangroves", state: "Odisha", coords: [19.72, 85.35] },
            { name: "Coringa Mangroves (Tulyabhadra and Korangi)", state: "Andhra Pradesh", coords: [16.82, 82.23] },
            { name: "East Godavari Mangroves", state: "Andhra Pradesh", coords: [16.75, 82.33] },
            { name: "Krishna Mangroves", state: "Andhra Pradesh", coords: [15.80, 80.85] },
            { name: "Sundarban Mangroves", state: "West Bengal", coords: [21.95, 88.75] },
            { name: "Pulicat Lake (Arani River)", state: "Tamil Nadu", coords: [13.45, 80.20] },
            { name: "Kazhuveli Mangroves (Palar River)", state: "Tamil Nadu", coords: [12.12, 79.90] },
            { name: "Pichavaram Mangroves (Kollidam and Uppanaru)", state: "Tamil Nadu", coords: [11.43, 79.79] },
            { name: "Muthupet Mangroves (Pamani River)", state: "Tamil Nadu", coords: [10.33, 79.52] },
            { name: "Ramnad Mangroves (Karankadu Region)", state: "Tamil Nadu", coords: [9.62, 78.95] },
            { name: "Vembanad Region Mangroves", state: "Kerala", coords: [9.60, 76.40] },
            { name: "Kannur Mangroves", state: "Kerala", coords: [11.87, 75.37] },
            { name: "Karwar Mangroves (Kalinadi)", state: "Karnataka", coords: [14.82, 74.13] },
            { name: "Honnavar Mangroves (Sharavathi)", state: "Karnataka", coords: [14.28, 74.44] },
            { name: "Kundapura Mangroves (Panchagangavali, Chakra and Kolluru)", state: "Karnataka", coords: [13.63, 74.68] },
            { name: "Mangalore Division Mangroves (Netravati and Gurupura)", state: "Karnataka", coords: [12.87, 74.83] },
            { name: "Rann of Kutch Mangroves", state: "Gujarat", coords: [23.00, 70.00] },
            { name: "Ubhrat Beach Mangroves", state: "Gujarat", coords: [20.89, 72.69] },
            { name: "Dumas Region Mangroves", state: "Gujarat", coords: [21.11, 72.71] },
            { name: "Mandavi-Zuari Mangroves", state: "Goa", coords: [15.43, 73.91] },
            { name: "Vaitarna Mangroves", state: "Maharashtra", coords: [19.47, 72.82] },
            { name: "Vasai-Manori Mangroves", state: "Maharashtra", coords: [19.23, 72.80] },
            { name: "Mumbra-Diva Mangroves (Ulhas River)", state: "Maharashtra", coords: [19.18, 73.03] },
            { name: "Kundalika-Revdanda Mangroves", state: "Maharashtra", coords: [18.55, 72.95] },
            { name: "Veldur Mangroves (Vashishti River)", state: "Maharashtra", coords: [17.56, 73.18] },
            { name: "Shrivardhan Mangroves", state: "Maharashtra", coords: [18.05, 73.02] },
            { name: "Devgarh-Vijaydurg Mangroves (Vaghotan River)", state: "Maharashtra", coords: [16.56, 73.34] },
            { name: "Achra Mangroves", state: "Maharashtra", coords: [16.19, 73.44] },
            { name: "Malvan Mangroves", state: "Maharashtra", coords: [16.06, 73.47] },
            { name: "Vikhroli Mangroves", state: "Maharashtra", coords: [19.11, 72.94] },
            { name: "Ratnagiri Mangroves", state: "Maharashtra", coords: [16.99, 73.30] }
        ];

        const colors = {
            main: '#29759b',
            correct: '#28a745',
            wrong: '#dc3545'
        };

        const map = L.map('map', { minZoom: 4, maxZoom: 11 }).setView([18.5, 78.5], 5);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

        let score = 0;
        let markers = [];
        let currentTarget = null;

        const modal = document.getElementById('gameModal');
        const guessView = document.getElementById('guessView');
        const resultView = document.getElementById('resultView');
        const input = document.getElementById('guessInput');

        function createIcon(color) {
            return L.divIcon({
                className: 'custom-point',
                html: `<div style="background-color:${color}; width:12px; height:12px; border-radius:50%; border:2px solid white; box-shadow:0 0 5px rgba(0,0,0,0.3);"></div>`,
                iconSize: [12, 12],
                iconAnchor: [6, 6]
            });
        }

        function initGame() {
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            score = 0;
            document.getElementById('score').textContent = score;
            document.getElementById('total').textContent = mangrovesData.length;

            mangrovesData.forEach(w => {
                const marker = L.marker(w.coords, { icon: createIcon(colors.main) }).addTo(map);
                const markerObj = { marker, data: w, guessed: false, result: null };

                marker.on('click', () => {
                    currentTarget = markerObj;
                    if (!markerObj.guessed) showGuessMode();
                    else showInfoMode(markerObj);
                });
                markers.push(markerObj);
            });
        }

        function showGuessMode() {
            guessView.style.display = 'block';
            resultView.style.display = 'none';
            input.value = '';
            modal.style.display = 'flex';
            input.focus();
        }

        function showInfoMode(mObj) {
            guessView.style.display = 'none';
            resultView.style.display = 'block';
            const fb = document.getElementById('feedback');
            fb.textContent = mObj.result === 'correct' ? "✅ Correct!" : `❌ ${mObj.data.name}`;
            fb.style.color = mObj.result === 'correct' ? colors.correct : colors.wrong;

            document.getElementById('infoName').textContent = mObj.data.name;
            document.getElementById('infoState').textContent = mObj.data.state;
            modal.style.display = 'flex';
        }

        // FIX: SUBMIT GUESS LOGIC
        document.getElementById('submitGuess').addEventListener('click', () => {
            if (!currentTarget) return;
            const guess = input.value.trim().toLowerCase();

            // 1. Prevent empty submission from being correct
            if (guess === "") {
                alert("Please enter a name!");
                return;
            }

            const correctName = currentTarget.data.name.toLowerCase();
            const correctState = currentTarget.data.state.toLowerCase();

            // 2. Logic to check if guess is correct (Name match or State match)
            const isCorrect = (guess === correctName) ||
                (guess === correctState) ||
                (guess.length > 2 && correctName.includes(guess));

            currentTarget.guessed = true;
            currentTarget.result = isCorrect ? 'correct' : 'wrong';
            if (isCorrect) score++;

            document.getElementById('score').textContent = score;
            currentTarget.marker.setIcon(createIcon(isCorrect ? colors.correct : colors.wrong));
            showInfoMode(currentTarget);
        });

        // FIX: CLOSE MODAL ON OUTSIDE CLICK
        window.onclick = function (event) {
            if (event.target == modal) {
                modal.style.display = "none";
            }
        };

        input.addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('submitGuess').click(); });
        document.getElementById('closeBtn').onclick = () => modal.style.display = 'none';

        document.getElementById('resetBtn').onclick = initGame;
        document.getElementById('showAllBtn').onclick = () => {
            markers.forEach(m => {
                const tip = L.tooltip({ permanent: true, direction: 'top' })
                    .setContent(`<b>${m.data.name}</b>`)
                    .setLatLng(m.data.coords)
                    .addTo(map);
                setTimeout(() => map.removeLayer(tip), 4000);
            });
        };

        initGame();
    </script>

</body>

</html>
